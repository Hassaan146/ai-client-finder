[tool.ruff]
target-version = "py311"
line-length = 110
extend-exclude = ["backend/dev.db"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "RUF"]

[tool.ruff.lint.per-file-ignores]
# scripts are CLI harnesses: prints + long report lines are intentional
"backend/scripts/*" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = ["backend"]
